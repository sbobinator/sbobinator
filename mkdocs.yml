# MkDocs — Sbobinator documentation (GitHub Pages)
# Preview:  pip install -r docs/requirements.txt && mkdocs serve
# Publish:  scripts\publish_docs.bat   (or python scripts/publish_docs.py)
#           → copies build to ../sbobinator.github.io/docs/ then git push there

site_name: Sbobinator
site_description: Italian audio/video transcription with NVIDIA NeMo Parakeet
site_author: Antonio Trento
site_url: https://sbobinator.github.io/docs/
repo_url: https://github.com/sbobinator/sbobinator
repo_name: sbobinator/sbobinator
edit_uri: edit/main/docs/en/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: false
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: it
          name: Italiano
          build: true
          nav_translations:
            Home: Home
            Getting started: Per iniziare
            User guide: Guida utente
            Architecture: Architettura
            Deploy: Deploy
            Operations: Operatività
            Troubleshooting: Risoluzione problemi
            Development: Sviluppo
            Reference: Riferimento
            Changelog: Changelog
            Overview: Panoramica
            Installation: Installazione
            Quick start: Avvio rapido
            Models: Modelli
            Hardware: Risorse hardware
            Web UI: Interfaccia web
            CLI: CLI
            Jobs & queue: Coda e storico
            Summarization: Riassunto
            File formats: Formati file
            Data flow: Flusso dati
            Worker: Worker
            Storage: Storage
            Local Windows: Windows locale
            Docker: Docker
            Environment: Variabili ambiente
            Scripts: Script
            Benchmark: Benchmark
            Maintenance: Manutenzione
            Common issues: Problemi comuni
            SSL on Windows: SSL Windows
            Project structure: Struttura progetto
            Contributing: Contribuire
            Configuration: Configurazione
            CLI reference: Riferimento CLI
            Modules: Moduli
            Job schema: Schema job
            FAQ: FAQ
            Glossary: Glossario
            Licenses: Licenze
            Commercial license: Licenza commerciale
  - search: {}

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - getting-started/overview.md
      - getting-started/installation.md
      - getting-started/quickstart.md
      - getting-started/models.md
      - getting-started/hardware.md
  - User guide:
      - user-guide/web-ui.md
      - user-guide/cli.md
      - user-guide/jobs-queue.md
      - user-guide/summarization.md
      - user-guide/file-formats.md
  - Architecture:
      - architecture/overview.md
      - architecture/data-flow.md
      - architecture/worker.md
      - architecture/storage.md
  - Deploy:
      - deployment/local-windows.md
      - deployment/docker.md
      - deployment/environment.md
  - Operations:
      - operations/scripts.md
      - operations/benchmark.md
      - operations/maintenance.md
  - Troubleshooting:
      - troubleshooting/common-issues.md
      - troubleshooting/ssl-windows.md
  - Development:
      - development/project-structure.md
      - development/contributing.md
  - Reference:
      - reference/configuration.md
      - reference/cli-reference.md
      - reference/modules.md
      - reference/job-schema.md
      - reference/faq.md
      - reference/glossary.md
      - reference/licenses.md
      - reference/commercial-license.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sbobinator/sbobinator
