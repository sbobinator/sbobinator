# Volumi: ../data (input, output/jobs, .secrets con API key riassunto).
# Modelli ASR Parakeet nell'immagine (/models). Riassunto LLM via API cloud o Qwen scaricato a runtime.
# UI: FastAPI + uvicorn su porta 8501.
services:
  sbobinator-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: sbobinator:cpu
    profiles: ["cpu"]
    ports:
      - "8501:8501"
    volumes:
      - ../data:/data
    environment:
      - NEMO_CACHE_DIR=/models
      - SBOBINATOR_DATA=/data
      - SBOBINATOR_UI_HOST=0.0.0.0
      # API key riassunto (opzionale — oppure salva da UI in /data/.secrets/summary_keys.json):
      # - SBOBINATOR_DEEPSEEK_API_KEY=
      # - SBOBINATOR_OPENAI_API_KEY=
    command: ui --port 8501
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/partials/queue"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  sbobinator-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: sbobinator:gpu
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8501:8501"
    volumes:
      - ../data:/data
    environment:
      - NEMO_CACHE_DIR=/models
      - SBOBINATOR_DATA=/data
      - SBOBINATOR_UI_HOST=0.0.0.0
      # - SBOBINATOR_DEEPSEEK_API_KEY=
    command: ui --port 8501
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/partials/queue"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
